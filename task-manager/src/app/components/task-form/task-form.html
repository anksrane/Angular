<div class="task-container">
  <h2 class="task-title">Add Task</h2>

  <div *ngIf="successMessage()" class="success-message">
    {{ successMessage() }}
  </div>

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="task-form">

    <!-- TITLE -->
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" formControlName="title" class="form-input" />

      <div class="error-message"
           *ngIf="formControls['title'].touched && formControls['title'].invalid">
        <small *ngIf="formControls['title'].errors?.['required']">
          Title is required
        </small>
        <small *ngIf="formControls['title'].errors?.['minlength']">
          Minimum 3 characters required
        </small>
      </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea formControlName="description" class="form-textarea"></textarea>
    </div>

    <!-- STATUS -->
    <div class="form-group">
      <label class="form-label">Status</label>
      <select formControlName="status" class="form-select">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
    </div>

    <!-- SUBMIT BUTTON -->
    <button type="submit"
            class="submit-btn"
            [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Saving...' : 'Add Task' }}
    </button>

  </form>
</div>
